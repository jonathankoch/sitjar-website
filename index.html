<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mas Sitjar</title>
  <meta name="description" content="Mas Sitjar" />
  <meta name="theme-color" content="#0f1116" />

  <!-- preload hero -->
  <link rel="preload" as="image" href="images/hero.jpg" fetchpriority="high" />

  <!-- title font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@1,400;1,500;1,700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="js/directions.js"></script>
</head>
<body>
  <main class="hero">
    <!-- hero image -->
    <img
      class="hero__img"
      src="images/hero.jpg"
      alt="A misty mountain ridge at Mas Sitjar, low clouds drifting through the valley at dawn."
      fetchpriority="high"
      decoding="async"
    />

    <div class="hero__content">
      <h1 class="hero__title">Mas Sitjar</h1>
    </div>

    <!-- find us -->
    <button type="button" class="hero__cta" id="directions-open">Find Us</button>

    <!-- grain -->
    <div class="grain" aria-hidden="true"></div>

    <!-- intro overlay -->
    <div class="reveal" aria-hidden="true"></div>
  </main>

  <!-- find us dialog -->
  <div class="modal" id="directions-modal" role="dialog" aria-modal="true"
       aria-labelledby="modal-title" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card">
      <button type="button" class="modal__close" data-close aria-label="Close">&times;</button>

      <!-- prompt -->
      <div class="modal__view" id="view-password">
        <h2 class="modal__title" id="modal-title">Finding Mas Sitjar</h2>
        <p class="modal__hint">Enter the password from your invitation to see the map and directions.</p>
        <form id="directions-form" novalidate>
          <input class="modal__input" type="password" id="directions-password"
                 name="password" placeholder="Password"
                 autocomplete="current-password" required />
          <button type="submit" class="modal__submit">Unlock map</button>
          <p class="modal__error" id="directions-error" role="alert" hidden></p>
        </form>
      </div>

      <!-- map -->
      <div class="modal__view" id="view-map" hidden>
        <h2 class="modal__title">Mas Sitjar</h2>
        <p class="modal__address" id="map-address"></p>
        <div class="modal__map" id="map-embed"></div>
        <a class="modal__maps-link" id="map-link" href="#" target="_blank" rel="noopener noreferrer">
          Open in Google Maps &#8599;
        </a>
      </div>
    </div>
  </div>
</body>
</html>
